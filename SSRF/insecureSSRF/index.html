<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSRF Vulnerable Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
    }
    input, button {
      font-size: 16px;
      padding: 8px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>SSRF Lab (Intentionally Vulnerable)</h1>
  <p>
    Enter any URL. This page sends it directly to the backend, which fetches it
    server-side.
  </p>

  <label for="targetUrl">Target URL</label>
  <input
    id="targetUrl"
    type="text"
    value="http://example.com"
    placeholder="http://example.com"
  />
  <button id="sendBtn">Send to Server</button>

  <h2>Server Response</h2>
  <pre id="output">No response yet.</pre>

  <script>
    const targetUrlInput = document.getElementById("targetUrl");
    const sendBtn = document.getElementById("sendBtn");
    const output = document.getElementById("output");

    sendBtn.addEventListener("click", async () => {
      const targetUrl = targetUrlInput.value.trim();
      if (!targetUrl) {
        output.textContent = "Please enter a URL.";
        return;
      }

      try {
        // Intentionally vulnerable: user-controlled URL is sent directly.
        const response = await fetch(`/fetch?url=${encodeURIComponent(targetUrl)}`);
        const text = await response.text();
        output.textContent = text;
      } catch (err) {
        output.textContent = `Error: ${err.message}`;
      }
    });
  </script>
</body>
</html>
