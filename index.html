<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Learning Home</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b 45%, #334155);
            color: #e2e8f0;
            display: grid;
            place-items: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 12px;
        }

        a {
            display: block;
            text-decoration: none;
            color: #bfdbfe;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 10px;
            padding: 12px 14px;
            transition: transform 120ms ease, border-color 120ms ease;
        }

        a:hover {
            transform: translateY(-2px);
            border-color: #60a5fa;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Security Learning Home Page</h1>
        <p>
            This home page contains links to various security attack learning and exploration pages.
            Add your new HTML files here as you continue your hands-on practice.
        </p>

        <ul>
            <li><a href="./reflectedXSS.html">Reflected XSS Exploration</a></li>
        </ul>
    </main>
</body>
</html>
