<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authentication Demo</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #111827;
    }

    .container {
      width: min(780px, 92vw);
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    p {
      margin-top: 0;
      color: #4b5563;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin-top: 16px;
    }

    form {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      margin-top: 12px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      margin-top: 14px;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #1d4ed8;
    }

    .status {
      margin-top: 14px;
      border-radius: 8px;
      padding: 10px;
      min-height: 20px;
      background: #f3f4f6;
      color: #111827;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Login & Register</h1>
    <p>Create a new user, then log in using the same credentials.</p>

    <section class="grid">
      <form id="register-form">
        <h2>Create User</h2>
        <label for="register-username">Username</label>
        <input id="register-username" name="username" minlength="3" required />

        <label for="register-password">Password</label>
        <input id="register-password" name="password" type="password" minlength="6" required />

        <button type="submit">Create User</button>
      </form>

      <form id="login-form">
        <h2>Login</h2>
        <label for="login-username">Username</label>
        <input id="login-username" name="username" required />

        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" required />

        <button type="submit">Login</button>
      </form>
    </section>

    <section id="status" class="status" aria-live="polite"></section>
  </main>

  <script>
    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.background = isError ? "#fee2e2" : "#ecfeff";
      statusEl.style.color = isError ? "#991b1b" : "#0f172a";
    }

    async function sendAuthRequest(path, payload) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || "Request failed");
      }

      return data;
    }

    document.getElementById("register-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = document.getElementById("register-username").value.trim();
      const password = document.getElementById("register-password").value;

      try {
        const result = await sendAuthRequest("/api/register", { username, password });
        setStatus(`User created successfully.\n${result.message}`);
      } catch (error) {
        setStatus(`Create user failed: ${error.message}`, true);
      }
    });

    document.getElementById("login-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;

      try {
        const result = await sendAuthRequest("/api/login", { username, password });
        setStatus(`Login successful.\nSession token: ${result.token}`);
      } catch (error) {
        setStatus(`Login failed: ${error.message}`, true);
      }
    });

    setStatus("Ready. Create a user or login.");
  </script>
</body>
</html>
